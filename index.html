<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランニングチェッカー | おしえてかめさん</title>
    
    <!-- スマホホーム画面用のアイコン設定 -->
    <link rel="apple-touch-icon" href="IMG_4273.png">
    <link rel="icon" type="image/png" href="IMG_4273.png">
    
    <!-- 画像をタイムラグなしでパッと出すための強力なプリロード -->
    <link rel="preload" href="IMG_4274.png" as="image" fetchpriority="high">
    <link rel="preload" href="IMG_4275.png" as="image" fetchpriority="high">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- 【入力画面】 -->
    <div id="inputPage">
        <header>
            <h1>ランニングチェッカー</h1>
            <p>明日の朝、走ってもいいか判定します</p>
        </header>

        <form id="checkerForm">
            <section>
                <h2><span class="badge danger">絶対条件</span> 1つでもあればお休み</h2>
                <div class="checkbox-group">
                    <label class="check-item"><input type="checkbox" class="critical-check" value="走りたくない"><span>ぶっちゃけ、今はあまり走りたくない</span></label>
                    <label class="check-item"><input type="checkbox" class="critical-check" value="体調不良"><span>体調不良（発熱・喉の痛みなど）</span></label>
                    <label class="check-item"><input type="checkbox" class="critical-check" value="睡眠不足"><span>睡眠時間が5時間以下</span></label>
                    <label class="check-item"><input type="checkbox" class="critical-check" value="義務感"><span>「走らなければいけない」と思っている</span></label>
                    <label class="check-item"><input type="checkbox" class="critical-check" value="雨予報"><span>明日の朝、雨が降る（または予報）</span></label>
                </div>
            </section>

            <section>
                <h2><span class="badge warning">累積条件</span> 3つ以上重なったらお休み</h2>
                <div class="checkbox-group">
                    <label class="check-item"><input type="checkbox" class="caution-check" value="ロング日勤"><span>ロング日勤の直後、または翌朝である</span></label>
                    <label class="check-item"><input type="checkbox" class="caution-check" value="眠気"><span>とにかく眠気が強い</span></label>
                    <label class="check-item"><input type="checkbox" class="caution-check" value="ダルさ"><span>身体が重く、全体的なダルさがある</span></label>
                    <label class="check-item"><input type="checkbox" class="caution-check" value="足の違和感"><span>足や関節に軽い痛み・違和感がある</span></label>
                    <label class="check-item"><input type="checkbox" class="caution-check" value="水分不足"><span>今日、日中に水分をあまり摂れなかった</span></label>
                </div>
            </section>

            <button type="button" class="btn-calc" id="diagnoseBtn">布団に入る前に判定する</button>
        </form>
        
        <!-- カード形式の履歴表示エリア -->
        <div class="history-box">
            <h3>これまでのスケジュール記録</h3>
            <div id="historyGrid" class="history-grid"></div>
        </div>
    </div>

    <!-- 【判定結果画面】説明を削ぎ落とした極シンプル構成 -->
    <div id="resultPage" class="result-page-view" style="display: none;">
        <div id="resultTitle" class="result-title"></div>
        
        <div class="img-wrapper">
            <img id="resultImage" class="result-img" src="" alt="判定結果">
        </div>
        
        <button type="button" class="btn-back" id="backBtn">チェック画面に戻る</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
