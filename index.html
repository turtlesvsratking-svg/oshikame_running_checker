<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翌朝のランニング判定ツール | おしえてかめさん</title>
    
    <!-- ホーム画面ショートカット用のアイコン設定 -->
    <!-- iOS (Safari) 用 -->
    <link rel="apple-touch-icon" href="IMG_4273.png">
    <!-- Android (Chrome) / 一般的なファビコン代替用 -->
    <link rel="icon" type="image/png" href="IMG_4273.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>ランニングチェッカー</h1>
        <p>〜 明日の朝は走って良い？ 〜</p>
    </header>

    <form id="checkerForm">
        <!-- 一発アウトの項目 -->
        <section id="criticalSection">
            <h2><span class="badge danger">絶対条件</span> 1つでもあれば「一発休養」</h2>
            <div class="checkbox-group">
                <label class="check-item">
                    <input type="checkbox" class="critical-check" value="走りたくない気持ち">
                    <span>ぶっちゃけ、今はあまり走りたくない</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" class="critical-check" value="体調不良">
                    <span>体調不良（発熱・喉の痛み・胃腸症状など）</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" class="critical-check" value="睡眠不足">
                    <span>睡眠時間が5時間以下</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" class="critical-check" value="義務感">
                    <span>「走らなければいけない」と思っている</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" class="critical-check" value="雨">
                    <span>明日の朝、雨が降る（または予報）</span>
                </label>
            </div>
        </section>

        <!-- 加算アウトの項目 -->
        <section id="cautionSection">
            <h2><span class="badge warning">累積条件</span> 3つ以上重なったら「ストップ」</h2>
            <div class="checkbox-group">
                <label class="check-item">
                    <input type="checkbox" class="caution-check" value="ロング日勤後">
                    <span>ロング日勤の直後、または翌朝である</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" class="caution-check" value="眠気">
                    <span>とにかく眠気が強い</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" class="caution-check" value="ダルさ">
                    <span>身体が重く、全体的なダルさがある</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" class="caution-check" value="足の違和感">
                    <span>足や関節に軽い痛み・違和感がある</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" class="caution-check" value="水分不足">
                    <span>今日、日中に水分をあまり摂れなかった</span>
                </label>
            </div>
        </section>

        <button type="button" class="btn-calc" id="diagnoseBtn">布団に入る前に判定する</button>
    </form>

    <!-- 結果表示エリア -->
    <div id="resultArea" class="result-modal">
        <div id="resultTitle" class="result-title"></div>
        <div id="resultComment" class="result-comment"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
